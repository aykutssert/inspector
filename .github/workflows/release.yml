name: release

# Builds the scout binary for every supported OS/arch on tag push and uploads
# them as release assets. Asset names match what npm/scripts/install.js expects:
# scout-<goos>-<goarch>[.exe] (goos: darwin|linux|windows, goarch: amd64|arm64).
#
# scout links go-tree-sitter (CGO), so every target is built with CGO_ENABLED=1
# on a runner that has the matching C toolchain — pure GOOS/GOARCH cross-build
# without a C compiler would fail.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-latest, goos: darwin, goarch: arm64 }
          # darwin/amd64 cross-built on the arm64 runner — the scarce macos-13
          # Intel runners queue for many minutes. macOS clang targets x86_64
          # natively (universal SDK), so CGO/tree-sitter cross-compiles fine.
          - { runner: macos-latest, goos: darwin, goarch: amd64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-latest, goos: linux, goarch: arm64, cc: aarch64-linux-gnu-gcc, apt: gcc-aarch64-linux-gnu }
          - { runner: windows-latest, goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: install cross C toolchain (linux/arm64)
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          out="scout-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "$out" ./cmd/scout
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - name: upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
