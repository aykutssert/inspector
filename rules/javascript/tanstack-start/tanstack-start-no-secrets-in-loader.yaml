rules:
  - id: tanstack-start-no-secrets-in-loader
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Secret environment variable accessed inside a TanStack Start route loader.
      Route loaders can be compiled into the client bundle, which would expose the secret.
      Move secret access into a createServerFn() to guarantee server-only execution.
    metadata:
      category: security
      confidence: hint
    patterns:
      - pattern: process.env.$SECRET_VAR
      - pattern-inside: |
          {
            loader: async (...) => {
              ...
            }
          }
      - metavariable-regex:
          metavariable: $SECRET_VAR
          regex: (?i)(SECRET|API_KEY|PRIVATE|DATABASE_URL|DB_PASSWORD|AUTH_SECRET|JWT_SECRET|ENCRYPTION)
