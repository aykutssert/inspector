rules:
  - id: nestjs-missing-validation-pipe
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A NestJS controller method accepts a request body via @Body(), but
      no @UsePipes(ValidationPipe) decorator is declared on the method or the class.
      Ensure input validation is active (either via local @UsePipes or a global
      ValidationPipe in main.ts) to prevent unvalidated payloads.
    metadata:
      category: maintainability
      confidence: hint
    patterns:
      - pattern-inside: |
          @Controller(...)
          class $CLASS {
            ...
          }
      - pattern-not-inside: |
          @Controller(...)
          @UsePipes(...)
          class $CLASS {
            ...
          }
      - pattern-either:
          - pattern: |
              @$HTTP_METHOD(...)
              async $METHOD(..., @Body(...) $BODY, ...) {
                ...
              }
          - pattern: |
              @$HTTP_METHOD(...)
              $METHOD(..., @Body(...) $BODY, ...) {
                ...
              }
      - metavariable-regex:
          metavariable: $HTTP_METHOD
          regex: ^(Post|Put|Patch|Delete)$
      - pattern-not: |
          @UsePipes(...)
          @$HTTP_METHOD(...)
          async $METHOD(...) {
            ...
          }
      - pattern-not: |
          @UsePipes(...)
          @$HTTP_METHOD(...)
          $METHOD(...) {
            ...
          }
