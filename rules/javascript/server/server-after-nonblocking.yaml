rules:
  - id: server-after-nonblocking
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Logging or analytics call inside a request handler may block the response.
      Use after() from next/after to defer non-critical work until after the
      response is sent to the client.
    metadata:
      category: performance
      confidence: hint
    patterns:
      - pattern-either:
          - pattern: console.log($ARG)
          - pattern: console.error($ARG)
          - pattern: analytics.track($ARG)
      - pattern-inside: |
          export async function $FUNC($REQ: Request) {
            ...
          }
