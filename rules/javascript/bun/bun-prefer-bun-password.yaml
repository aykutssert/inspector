rules:
  - id: bun-prefer-bun-password
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      This code uses external hashing libraries (bcrypt, bcryptjs, argon2) or Node.js
      crypto.pbkdf2 for password hashing. If you are running on the Bun runtime,
      prefer using the optimized native APIs 'Bun.password.hash(...)' and
      'Bun.password.verify(...)'.
    metadata:
      category: quality
      confidence: hint
    patterns:
      - pattern-either:
          - pattern: bcrypt.hash(...)
          - pattern: bcrypt.hashSync(...)
          - pattern: bcrypt.compare(...)
          - pattern: bcrypt.compareSync(...)
          - pattern: bcryptjs.hash(...)
          - pattern: bcryptjs.compare(...)
          - pattern: argon2.hash(...)
          - pattern: argon2.verify(...)
          - pattern: crypto.pbkdf2(...)
          - pattern: crypto.pbkdf2Sync(...)
