rules:
  - id: no-flush-sync
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Avoid using flushSync() to force synchronous updates.
      flushSync() bypasses React's concurrent rendering optimization and triggers synchronous, blocking layout passes.
      If integrating with View Transitions, use React 19's native startTransition support instead.
    metadata:
      category: performance
      confidence: rule
    patterns:
      - pattern-either:
          - pattern: flushSync(...)
          - pattern: ReactDOM.flushSync(...)
