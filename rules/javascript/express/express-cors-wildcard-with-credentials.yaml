rules:
  - id: express-cors-wildcard-with-credentials
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      CORS is configured with origin '*' and credentials enabled. Browsers reject
      this combination, and relaxing it later often turns into credential leakage.
      Use an explicit allowlist of trusted origins when cookies or authorization
      headers are allowed.
    metadata:
      category: security
      cwe:
        - "CWE-942: Permissive Cross-domain Policy with Untrusted Domains"
      owasp:
        - "A05:2021 - Security Misconfiguration"
      confidence: hint
    patterns:
      - pattern-either:
          - pattern: |
              cors({ ..., origin: "*", ..., credentials: true, ... })
          - pattern: |
              cors({ ..., origin: '*', ..., credentials: true, ... })
          - pattern: |
              cors({ ..., credentials: true, ..., origin: "*", ... })
          - pattern: |
              cors({ ..., credentials: true, ..., origin: '*', ... })
