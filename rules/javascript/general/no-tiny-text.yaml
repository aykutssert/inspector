rules:
  - id: no-tiny-text
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Tiny text size detected (less than 12px).
      Font sizes below 12px (0.75rem) are very difficult to read on most screens, especially for visually impaired users.
      Keep font sizes at 12px or larger (use standard Tailwind text-xs, text-sm, etc.).
    metadata:
      category: accessibility
      confidence: hint
    patterns:
      - pattern-either:
          - patterns:
              - pattern-either:
                  - pattern: |
                      <$TAG ... style={{ fontSize: $VAL }} ... />
                  - pattern: |
                      <$TAG ... style={{ fontSize: $VAL }} ...>...</$TAG>
              - metavariable-regex:
                  metavariable: $VAL
                  regex: ^(["']?)(([1-9]|1[0-1])(px|pt)?|0\.[1-6]\d*r?em)\1$
          - patterns:
              - pattern-either:
                  - pattern: <$TAG className=$CLASS ... />
                  - pattern: <$TAG className=$CLASS ...>...</$TAG>
              - metavariable-regex:
                  metavariable: $CLASS
                  regex: (?i)^['"]?.*text-\[(([1-9]|1[0-1])px|0\.[1-6]\d*rem)\].*['"]?$
