rules:
  - id: tainted-hardcoded-secret
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A hardcoded secret or credential (an AWS access key, a GitHub/Slack/Stripe
      token, a Google API key, or a PEM private key) is assigned to a variable or
      object property and then flows into a function call. Unlike the regex rule,
      this catches indirect usage where the literal is stored first and consumed
      elsewhere. Committed secrets are exposed to everyone with repository access
      and remain in git history even after deletion. Move the value to an
      environment variable or a secret manager, rotate the leaked credential
      immediately, and purge it from git history.
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      # hint: this is file-local dataflow (a secret-shaped literal travels into a
      # call). The agent confirms the value is a genuine credential and not a
      # test/placeholder key. Kept at hint until the false-positive profile is
      # measured, like the other taint rules in this directory.
      confidence: hint
    pattern-sources:
      # Each source is a string-literal metavariable constrained to a vendor key
      # shape. NOTE: semgrep metavariable-regex is start-anchored (re.match) and
      # the bound text for a string literal KEEPS the surrounding quotes, so the
      # value looks like `"AKIA..."`. Every regex must therefore lead with `.*`
      # to skip the opening quote, otherwise it never matches.
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # AWS access key id: AKIA + 16 uppercase alphanumerics.
              regex: .*AKIA[0-9A-Z]{16}
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # GitHub personal access token (classic): ghp_ + 36 chars.
              regex: .*ghp_[0-9A-Za-z]{36}
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # Stripe secret key (live): sk_live_ + >=16 chars. pk_live_/sk_test_ excluded.
              regex: .*sk_live_[0-9A-Za-z]{16,}
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # Slack token: xox[baprs]- + >=10 chars.
              regex: .*xox[baprs]-[0-9A-Za-z-]{10,}
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # Google API key: AIza + 35 chars.
              regex: .*AIza[0-9A-Za-z_-]{35}
      - patterns:
          - pattern: "$SECRET"
          - metavariable-regex:
              metavariable: $SECRET
              # PEM private key header (RSA/EC/OPENSSH/DSA/PGP or plain).
              regex: .*-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----
    pattern-sinks:
      # Sinks that require the secret to TRAVEL: it is consumed as a call
      # argument. Pairing this with the literal source means the rule lights up
      # for `const x = "sk_live_..."; useStripe(x)` (the indirect case the regex
      # rule misses) while staying off plain non-secret strings.
      - pattern: $F($SINK, ...)
      - pattern: $F(..., $SINK, ...)
      - pattern: new $F($SINK, ...)
      - pattern: new $F(..., $SINK, ...)
