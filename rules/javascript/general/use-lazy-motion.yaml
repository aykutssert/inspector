rules:
  - id: use-lazy-motion
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Eagerly imported 'motion' from 'framer-motion' detected. This pulls in the entire bundle of framer-motion.
      To reduce bundle size, import 'm' instead of 'motion', and wrap your motion elements in '<LazyMotion features={domAnimation}>'.
    metadata:
      category: performance
      confidence: rule
    patterns:
      - pattern-either:
          - pattern: import { ..., motion, ... } from 'framer-motion'
          - pattern: import motion from 'framer-motion'
