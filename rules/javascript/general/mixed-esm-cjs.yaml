rules:
  - id: mixed-esm-cjs
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      This file mixes ESM imports with CommonJS require(). Mixed module systems
      often behave differently across Node, bundlers, and test runners,
      especially under "type": "module". Use one module system consistently in a
      file, or isolate interop behind a small adapter.
    metadata:
      category: compatibility
      confidence: hint
    patterns:
      - pattern-either:
          - pattern-inside: |
              import $DEFAULT from $MOD;
              ...
          - pattern-inside: |
              import { $IMPORTS } from $MOD;
              ...
          - pattern-inside: |
              import * as $NS from $MOD;
              ...
      - pattern: require(...)
      # Asset require() is idiomatic in React Native / Metro (fonts, images,
      # media have no ESM equivalent) and is NOT module-system mixing. Excluding
      # it stops a false-positive flood on Expo/RN files.
      - pattern-not-regex: require\(\s*['"`][^'"`]*\.(png|jpe?g|gif|svg|webp|avif|bmp|ico|ttf|otf|woff2?|eot|mp4|webm|mov|mp3|wav|ogg|m4a|aac|lottie|json)['"`]\s*\)
