rules:
  - id: tainted-dom-xss
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Browser-controlled input reaches an HTML-injection sink without
      sanitization, leading to DOM-based Cross-Site Scripting (XSS). An attacker
      can craft a URL, fragment, or request field that injects script into the
      page. Render untrusted data as text (textContent), or sanitize it with a
      trusted library (e.g. DOMPurify.sanitize) before assigning it to an HTML
      sink.
    metadata:
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A03:2021 - Injection"
      confidence: hint
    pattern-sources:
      # Browser location/window sources
      - pattern: location.search
      - pattern: location.hash
      - pattern: location.href
      - pattern: window.location.search
      - pattern: window.location.hash
      - pattern: window.location.href
      - pattern: document.location.search
      - pattern: document.location.hash
      - pattern: document.location.href
      - pattern: document.URL
      - pattern: document.referrer
      - pattern: window.name
      - pattern: new URLSearchParams(...).get(...)
      # Express query/body/params sources
      - pattern: $REQ.query.$FIELD
      - pattern: $REQ.body.$FIELD
      - pattern: $REQ.params.$FIELD
      - pattern: $REQ.query[$FIELD]
      - pattern: $REQ.body[$FIELD]
      - pattern: $REQ.params[$FIELD]
      # Next.js request sources
      - pattern: $REQ.nextUrl.searchParams.get(...)
      # NestJS parameter decorators source
      - patterns:
          - pattern: $VAR
          - pattern-inside: |
              class $CLASS {
                $METHOD(..., @$PARAM_DEC(...) $VAR, ...) {
                  ...
                }
              }
          - metavariable-regex:
              metavariable: $PARAM_DEC
              regex: ^(Body|Query|Param|Headers|Req|Request)$
      # Next.js Server Actions parameter source (function-level "use server")
      - patterns:
          - pattern: $PARAM
          - pattern-either:
              - pattern-inside: |
                  function $FUNC(..., $PARAM, ...) {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  async function $FUNC(..., $PARAM, ...) {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  const $FUNC = (..., $PARAM, ...) => {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  const $FUNC = async (..., $PARAM, ...) => {
                    "use server";
                    ...
                  }
      # Next.js Server Actions parameter source (file-level "use server")
      - patterns:
          - pattern: $PARAM
          - pattern-either:
              - pattern-inside: |
                  "use server";
                  ...
                  function $FUNC(..., $PARAM, ...) {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  async function $FUNC(..., $PARAM, ...) {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  const $FUNC = (..., $PARAM, ...) => {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  const $FUNC = async (..., $PARAM, ...) => {
                    ...
                  }
    pattern-sanitizers:
      - pattern: DOMPurify.sanitize(...)
      - pattern: $DP.sanitize(...)
      - pattern: sanitizeHtml(...)
      - pattern: escapeHtml(...)
      - pattern: he.escape(...)
    pattern-sinks:
      - pattern: $EL.innerHTML = $SINK
      - pattern: $EL.outerHTML = $SINK
      - pattern: $EL.insertAdjacentHTML($POS, $SINK)
      - pattern: document.write($SINK)
      - pattern: document.writeln($SINK)
      - pattern: "<$TAG dangerouslySetInnerHTML={{__html: $SINK}} />"
