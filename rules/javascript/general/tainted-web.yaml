_sources: &sources
  pattern-sources:
    # Express query/body/params sources
    - pattern: $REQ.query.$FIELD
    - pattern: $REQ.body.$FIELD
    - pattern: $REQ.params.$FIELD
    - pattern: $REQ.query[$FIELD]
    - pattern: $REQ.body[$FIELD]
    - pattern: $REQ.params[$FIELD]
    # Next.js request sources
    - pattern: $REQ.nextUrl.searchParams.get(...)
    # NestJS parameter decorators source
    - patterns:
        - pattern: $VAR
        - pattern-inside: |
            class $CLASS {
              $METHOD(..., @$PARAM_DEC(...) $VAR, ...) {
                ...
              }
            }
        - metavariable-regex:
            metavariable: $PARAM_DEC
            regex: ^(Body|Query|Param|Headers|Req|Request)$
    # Next.js Server Actions parameter source (function-level "use server")
    - patterns:
        - pattern: $PARAM
        - pattern-either:
            - pattern-inside: |
                function $FUNC(..., $PARAM, ...) {
                  "use server";
                  ...
                }
            - pattern-inside: |
                async function $FUNC(..., $PARAM, ...) {
                  "use server";
                  ...
                }
            - pattern-inside: |
                const $FUNC = (..., $PARAM, ...) => {
                  "use server";
                  ...
                }
            - pattern-inside: |
                const $FUNC = async (..., $PARAM, ...) => {
                  "use server";
                  ...
                }
    # Next.js Server Actions parameter source (file-level "use server")
    - patterns:
        - pattern: $PARAM
        - pattern-either:
            - pattern-inside: |
                "use server";
                ...
                function $FUNC(..., $PARAM, ...) {
                  ...
                }
            - pattern-inside: |
                "use server";
                ...
                async function $FUNC(..., $PARAM, ...) {
                  ...
                }
            - pattern-inside: |
                "use server";
                ...
                const $FUNC = (..., $PARAM, ...) => {
                  ...
                }
            - pattern-inside: |
                "use server";
                ...
                const $FUNC = async (..., $PARAM, ...) => {
                  ...
                }

rules:
  - id: tainted-sql-query
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      User-controlled request data reaches a raw SQL query sink. Build SQL with
      parameterized placeholders or trusted query-builder APIs instead of
      concatenating request data into the SQL text.
    metadata:
      category: security
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command ('SQL Injection')"
      owasp:
        - "A03:2021 - Injection"
      confidence: hint
    <<: *sources
    pattern-sanitizers:
      - pattern: $SCHEMA.parse(...)
      - pattern: $SCHEMA.parseAsync(...)
      - pattern: $SCHEMA.safeParse(...)
      - pattern: $SCHEMA.safeParseAsync(...)
      - pattern: $VALIDATOR.parse(...)
      - pattern: $VALIDATOR.safeParse(...)
    pattern-sinks:
      - pattern: $DB.query($QUERY, ...)
      - pattern: $CONNECTION.query($QUERY, ...)
      - pattern: $POOL.query($QUERY, ...)
      - pattern: $DB.execute($QUERY, ...)
      - pattern: $DB.run($QUERY, ...)
      - pattern: $DB.all($QUERY, ...)
      - pattern: $DB.get($QUERY, ...)
      - pattern: $DB.each($QUERY, ...)
      - pattern: $PRISMA.$queryRawUnsafe($QUERY, ...)
      - pattern: $PRISMA.$executeRawUnsafe($QUERY, ...)
      - pattern: sequelize.query($QUERY, ...)
      - pattern: $SEQ.query($QUERY, ...)
      - pattern: knex.raw($QUERY, ...)
      - pattern: $KNEX.raw($QUERY, ...)
      - pattern: $REPO.query($QUERY, ...)
      - pattern: $ENTITY_MGR.query($QUERY, ...)

  - id: tainted-ssrf-request
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      User-controlled request data reaches an outbound HTTP request URL. This
      can lead to Server-Side Request Forgery (SSRF), where attackers make the
      server call internal services or attacker-controlled hosts. Resolve the
      destination from trusted route names or validate it against a strict
      allowlist before making the request.
    metadata:
      category: security
      cwe:
        - "CWE-918: Server-Side Request Forgery (SSRF)"
      owasp:
        - "A10:2021 - Server-Side Request Forgery (SSRF)"
      confidence: hint
    <<: *sources
    pattern-sanitizers:
      - pattern: assertAllowedUrl(...)
      - pattern: validateAllowedUrl(...)
      - pattern: allowedUrl(...)
      - pattern: trustedServiceUrl(...)
    pattern-sinks:
      - pattern: fetch($URL, ...)
      - pattern: axios($URL, ...)
      - pattern: axios.get($URL, ...)
      - pattern: axios.post($URL, ...)
      - pattern: axios.put($URL, ...)
      - pattern: axios.patch($URL, ...)
      - pattern: axios.delete($URL, ...)
      - pattern: axios.request($URL, ...)
      - pattern: got($URL, ...)
      - pattern: got.get($URL, ...)
      - pattern: got.post($URL, ...)
      - pattern: got.put($URL, ...)
      - pattern: got.patch($URL, ...)
      - pattern: got.delete($URL, ...)
      - pattern: got.head($URL, ...)
      - pattern: got.options($URL, ...)
      - pattern: got.any($URL, ...)
      - pattern: request($URL, ...)
      - pattern: request.get($URL, ...)
      - pattern: request.post($URL, ...)
      - pattern: superagent.get($URL, ...)
      - pattern: superagent.post($URL, ...)
      - pattern: urllib.request($URL, ...)

  - id: tainted-command-injection
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      User-controlled request data reaches an OS command execution sink. An
      attacker can inject shell metacharacters to run arbitrary commands on the
      server. Avoid passing request data into a shell; use a fixed command with
      an argument array (no shell), or validate the input against a strict
      allowlist before execution.
    metadata:
      category: security
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A03:2021 - Injection"
      confidence: hint
    <<: *sources
    pattern-sanitizers:
      - pattern: shellEscape(...)
      - pattern: escapeShell(...)
      - pattern: shellQuote(...)
      - pattern: assertAllowedCommand(...)
      - pattern: allowedCommand(...)
    pattern-sinks:
      - pattern: exec($CMD, ...)
      - pattern: execSync($CMD, ...)
      - pattern: spawn($CMD, ...)
      - pattern: spawnSync($CMD, ...)
      - pattern: execa($CMD, ...)
      - pattern: execa.command($CMD, ...)
      - pattern: $CP.exec($CMD, ...)
      - pattern: $CP.execSync($CMD, ...)
      - pattern: $CP.spawn($CMD, ...)
      - pattern: $CP.spawnSync($CMD, ...)

  - id: tainted-dom-xss
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Browser-controlled input reaches an HTML-injection sink without
      sanitization, leading to DOM-based Cross-Site Scripting (XSS). An attacker
      can craft a URL, fragment, or request field that injects script into the
      page. Render untrusted data as text (textContent), or sanitize it with a
      trusted library (e.g. DOMPurify.sanitize) before assigning it to an HTML
      sink.
    metadata:
      category: security
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation ('Cross-site Scripting')"
      owasp:
        - "A03:2021 - Injection"
      confidence: hint
    <<: *sources
    pattern-sanitizers:
      - pattern: DOMPurify.sanitize(...)
      - pattern: $DP.sanitize(...)
      - pattern: sanitizeHtml(...)
      - pattern: escapeHtml(...)
      - pattern: he.escape(...)
    pattern-sinks:
      - pattern: $EL.innerHTML = $SINK
      - pattern: $EL.outerHTML = $SINK
      - pattern: $EL.insertAdjacentHTML($POS, $SINK)
      - pattern: document.write($SINK)
      - pattern: document.writeln($SINK)
      - pattern: "<$TAG dangerouslySetInnerHTML={{__html: $SINK}} />"
