rules:
  - id: tainted-command-injection
    mode: taint
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      User-controlled request data reaches an OS command execution sink. An
      attacker can inject shell metacharacters to run arbitrary commands on the
      server. Avoid passing request data into a shell; use a fixed command with
      an argument array (no shell), or validate the input against a strict
      allowlist before execution.
    metadata:
      category: security
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command ('OS Command Injection')"
      owasp:
        - "A03:2021 - Injection"
      confidence: hint
    pattern-sources:
      # Express query/body/params sources
      - pattern: $REQ.query.$FIELD
      - pattern: $REQ.body.$FIELD
      - pattern: $REQ.params.$FIELD
      - pattern: $REQ.query[$FIELD]
      - pattern: $REQ.body[$FIELD]
      - pattern: $REQ.params[$FIELD]
      # Next.js request sources
      - pattern: $REQ.nextUrl.searchParams.get(...)
      # NestJS parameter decorators source
      - patterns:
          - pattern: $VAR
          - pattern-inside: |
              class $CLASS {
                $METHOD(..., @$PARAM_DEC(...) $VAR, ...) {
                  ...
                }
              }
          - metavariable-regex:
              metavariable: $PARAM_DEC
              regex: ^(Body|Query|Param|Headers|Req|Request)$
      # Next.js Server Actions parameter source (function-level "use server")
      - patterns:
          - pattern: $PARAM
          - pattern-either:
              - pattern-inside: |
                  function $FUNC(..., $PARAM, ...) {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  async function $FUNC(..., $PARAM, ...) {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  const $FUNC = (..., $PARAM, ...) => {
                    "use server";
                    ...
                  }
              - pattern-inside: |
                  const $FUNC = async (..., $PARAM, ...) => {
                    "use server";
                    ...
                  }
      # Next.js Server Actions parameter source (file-level "use server")
      - patterns:
          - pattern: $PARAM
          - pattern-either:
              - pattern-inside: |
                  "use server";
                  ...
                  function $FUNC(..., $PARAM, ...) {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  async function $FUNC(..., $PARAM, ...) {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  const $FUNC = (..., $PARAM, ...) => {
                    ...
                  }
              - pattern-inside: |
                  "use server";
                  ...
                  const $FUNC = async (..., $PARAM, ...) => {
                    ...
                  }
    pattern-sanitizers:
      - pattern: shellEscape(...)
      - pattern: escapeShell(...)
      - pattern: shellQuote(...)
      - pattern: assertAllowedCommand(...)
      - pattern: allowedCommand(...)
    pattern-sinks:
      - pattern: exec($CMD, ...)
      - pattern: execSync($CMD, ...)
      - pattern: spawn($CMD, ...)
      - pattern: spawnSync($CMD, ...)
      - pattern: execa($CMD, ...)
      - pattern: execa.command($CMD, ...)
      - pattern: $CP.exec($CMD, ...)
      - pattern: $CP.execSync($CMD, ...)
      - pattern: $CP.spawn($CMD, ...)
      - pattern: $CP.spawnSync($CMD, ...)
