rules:
  - id: hardcoded-secret
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      A hardcoded secret or credential appears in the source (an AWS access key,
      a GitHub/Slack/Stripe token, a Google API key, or a PEM private key).
      Committed secrets are exposed to everyone with repository access and stay
      in git history even after the line is deleted. Move the value to an
      environment variable or a secret manager, rotate the leaked credential
      immediately, and purge it from git history.
    metadata:
      category: security
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      # confidence rule (default): every pattern below matches a vendor-specific
      # key shape (fixed prefix + fixed length), so a match is almost never a
      # false positive — unlike a generic high-entropy heuristic.
    patterns:
      - pattern-either:
          # AWS access key id: AKIA + 16 uppercase alphanumerics.
          - pattern-regex: AKIA[0-9A-Z]{16}
          # GitHub personal access token (classic): ghp_ + 36 chars.
          - pattern-regex: ghp_[0-9A-Za-z]{36}
          # Stripe secret key (live): sk_live_ + >=16 chars. pk_live_/sk_test_ excluded.
          - pattern-regex: sk_live_[0-9A-Za-z]{16,}
          # Slack token: xox[baprs]- + >=10 chars.
          - pattern-regex: xox[baprs]-[0-9A-Za-z-]{10,}
          # Google API key: AIza + 35 chars.
          - pattern-regex: AIza[0-9A-Za-z_-]{35}
          # PEM private key header (RSA/EC/OPENSSH/DSA/PGP or plain).
          - pattern-regex: -----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----
