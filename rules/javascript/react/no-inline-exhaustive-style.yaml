rules:
  - id: no-inline-exhaustive-style
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Inline style object with many properties. Extract to a CSS class or
      Tailwind utility classes for better maintainability and smaller bundle size.
    metadata:
      category: quality
      confidence: hint
    pattern-regex: style=\{\{[^}]{200,}\}\}
