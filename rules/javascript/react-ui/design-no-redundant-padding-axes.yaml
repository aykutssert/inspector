rules:
  - id: design-no-redundant-padding-axes
    languages: [typescript, javascript]
    severity: INFO
    message: >
      Equal px-N and py-N Tailwind classes can be simplified to p-N.
      Use the shorthand utility to reduce class list noise.
    metadata:
      category: correctness
      confidence: hint
    pattern-regex: 'className=["''`][^"''`]*\bpx-(\d+(?:\.\d+)?)\b[^"''`]*\bpy-\1\b[^"''`]*["''`]'
