rules:
  - id: design-no-three-period-ellipsis
    languages: [typescript, javascript]
    severity: INFO
    message: >
      Three ASCII periods '...' used as an ellipsis in JSX text content.
      Use the typographic ellipsis character '…' (U+2026) instead for correct spacing
      and screen-reader pronunciation.
    metadata:
      category: correctness
      confidence: hint
    pattern-regex: '>\s*[^<{]*\.\.\.[^<{]*</'
