rules:
  - id: vite-public-secret-prefix
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A VITE_* environment variable is named like a secret. Vite exposes every
      VITE_* value to client-side code, so tokens, passwords, private keys, and
      credentials with this prefix are shipped to the browser. Rename real
      secrets without the VITE_ prefix and read them only on the server.
    metadata:
      category: security
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      confidence: hint
    pattern-regex: import\.meta\.env\.VITE_[A-Z0-9_]*(SECRET|TOKEN|PASSWORD|PASSPHRASE|CREDENTIAL|PRIVATE_KEY|API_KEY|APIKEY)
