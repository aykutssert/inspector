rules:
  - id: next-prefer-link-component
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A standard HTML <a> tag is used with an internal route. In Next.js, using
      <a> for internal navigation causes a full page reload, losing client-side
      routing benefits. Use the '<Link>' component from 'next/link' instead.
    metadata:
      category: performance
      confidence: hint
    patterns:
      - pattern: <a href=$HREF ...>$CHILDREN</a>
      - metavariable-pattern:
          metavariable: $HREF
          patterns:
            - pattern-regex: (?i)^['"`](/|\.|\.\.).*
