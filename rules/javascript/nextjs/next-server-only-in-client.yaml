rules:
  - id: next-server-only-in-client
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      A client component (using "use client") imports a server-only package or
      Node.js core module. This will fail to run or bundle in the browser.
      Ensure this import is only used in server components, or mock/stub the
      functionality on the client.
    metadata:
      category: bug
      confidence: rule
    patterns:
      - pattern-either:
          - pattern-inside: |
              "use client";
              ...
          - pattern-inside: |
              'use client';
              ...
      - pattern-either:
          - pattern: import $MOD from 'server-only'
          - pattern: import $MOD from 'fs'
          - pattern: import $MOD from 'child_process'
          - pattern: import $MOD from 'dns'
          - pattern: import $MOD from 'net'
          - pattern: import $MOD from 'tls'
          - pattern: import $MOD from 'pg'
          - pattern: import $MOD from 'mysql'
          - pattern: import $MOD from 'mongoose'
          - pattern: import $MOD from '@prisma/client'
          - pattern: require('server-only')
          - pattern: require('fs')
          - pattern: require('child_process')
