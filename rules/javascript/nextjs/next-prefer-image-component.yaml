rules:
  - id: next-prefer-image-component
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A standard HTML <img> tag is used. In Next.js, using <img> bypasses
      automatic image optimization (lazy loading, responsive sizing, and modern
      format conversion). Use the '<Image>' component from 'next/image' instead.
    metadata:
      category: performance
      confidence: hint
    patterns:
      - pattern: <img src=$SRC ... />
