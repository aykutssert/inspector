rules:
  - id: next-unsafe-redirect
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A Next.js redirect target is built from a dynamic value. If this value
      can be influenced by a user, the app may redirect to an attacker-controlled
      URL. Validate against an allowlist, resolve only internal paths, or build
      the destination from trusted route names.
    metadata:
      category: security
      cwe:
        - "CWE-601: URL Redirection to Untrusted Site ('Open Redirect')"
      owasp:
        - "A01:2021 - Broken Access Control"
      confidence: hint
    patterns:
      - pattern-either:
          - pattern: redirect($URL)
          - pattern: redirect($URL, ...)
          - pattern: permanentRedirect($URL)
          - pattern: permanentRedirect($URL, ...)
      - metavariable-pattern:
          metavariable: $URL
          patterns:
            - pattern-not: '"..."'
            - pattern-not: "'...'"
            - pattern-not: "`...`"
