rules:
  - id: next-async-client-component
    languages: [typescript, javascript]
    severity: ERROR
    message: >
      Client Components cannot be async functions. Making a Client Component async results in runtime errors
      and prevents proper client-side rendering. Convert the component to a synchronous function and use
      hooks like useEffect or useSWR/TanStack Query for data fetching, or keep it as a Server Component.
    metadata:
      category: correctness
      confidence: rule
    patterns:
      - pattern-inside: |
          "use client";
          ...
      # A literal `async` in the AST arrow pattern is not enforced by semgrep
      # (it matches sync arrows too — a false positive on every client
      # component), so require `async` next to a capitalized component name.
      - pattern-regex: '(?:async\s+function\s+[A-Z]\w*\s*\(|\b(?:const|let|var)\s+[A-Z]\w*\b[^=\n]*=\s*async\b)'
