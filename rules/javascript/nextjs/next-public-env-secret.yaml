rules:
  - id: next-public-env-secret
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A NEXT_PUBLIC_* environment variable named like a secret (secret, token,
      password, credential, private/api key) is read here. Next.js inlines every
      NEXT_PUBLIC_* value into the client JavaScript bundle, so this value is
      shipped to the browser and readable by anyone. If it is a real secret, drop
      the NEXT_PUBLIC_ prefix and read it only in server code (route handlers,
      server components, getServerSideProps). If the value is genuinely public
      (e.g. a publishable key), rename it so it no longer looks like a secret.
    metadata:
      category: security
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
      owasp:
        - "A02:2021 - Cryptographic Failures"
      # hint: the env-var name is the only signal. A NEXT_PUBLIC_..._PUBLISHABLE_KEY
      # is a legitimate client value, so the agent confirms the value is actually
      # secret before treating client exposure as a defect.
      confidence: hint
    # Raw-source regex: matches both process.env.NEXT_PUBLIC_X and the bracket form
    # process.env["NEXT_PUBLIC_X"]. Suffix list is restrictive (PRIVATE_KEY/API_KEY,
    # not bare KEY) so publishable keys do not all fire.
    pattern-regex: process\.env(?:\.|\[\s*["'])NEXT_PUBLIC_[A-Z0-9_]*(SECRET|TOKEN|PASSWORD|PASSPHRASE|CREDENTIAL|PRIVATE_KEY|API_KEY|APIKEY)
