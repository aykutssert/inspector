rules:
  - id: no-large-animated-blur
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      Large blur radius used in an animation. Animating blur() values above ~30px forces
      the GPU to re-composite on every frame, causing significant jank especially on mobile.
      Prefer smaller blur values (under 20px), or animate opacity/transform instead.
    metadata:
      category: performance
      confidence: hint
    patterns:
      - pattern-either:
          - pattern: |
              <$COMP ... animate={{ filter: $VAL }} ... />
          - pattern: |
              <$COMP ... animate={{ filter: $VAL }} ...>...</$COMP>
          - pattern: |
              <$COMP ... whileHover={{ filter: $VAL }} ... />
          - pattern: |
              <$COMP ... whileInView={{ filter: $VAL }} ... />
          - pattern: |
              <$COMP ... initial={{ filter: $VAL }} ... />
          - pattern: |
              <$COMP ... exit={{ filter: $VAL }} ... />
      - metavariable-regex:
          metavariable: $VAL
          regex: .*blur\(([3-9]\d|[1-9]\d{2,})px\).*
