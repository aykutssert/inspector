rules:
  - id: rn-prefer-content-inset-adjustment
    languages: [typescript, javascript]
    severity: INFO
    message: >
      Manual paddingTop/paddingBottom on SafeAreaView adds redundant safe-area
      inset — SafeAreaView already handles this natively on iOS. Remove manual
      padding and let SafeAreaView manage safe-area insets automatically. For
      ScrollView, use contentInsetAdjustmentBehavior="automatic" instead.
    metadata:
      category: quality
      confidence: hint
    patterns:
      - pattern-inside: |
          import { ..., SafeAreaView, ... } from "react-native";
          ...
      - pattern-either:
          - patterns:
              - pattern-either:
                  - pattern: <SafeAreaView style={$S}>...</SafeAreaView>
                  - pattern: <SafeAreaView style={$S} />
              - metavariable-regex:
                  metavariable: $S
                  regex: "(?s).*paddingTop.*"
          - patterns:
              - pattern-either:
                  - pattern: <SafeAreaView style={$S}>...</SafeAreaView>
                  - pattern: <SafeAreaView style={$S} />
              - metavariable-regex:
                  metavariable: $S
                  regex: "(?s).*paddingBottom.*"
