rules:
  - id: rn-prefer-pressable-over-gesture-detector
    languages: [typescript, javascript]
    severity: INFO
    message: >
      GestureDetector with only a Tap gesture is heavier than necessary. The
      Gesture.Tap API initializes the full gesture handler pipeline on the JS
      thread. For simple tap interactions, Pressable is lighter, works on both
      threads, and requires no native setup.
    metadata:
      category: performance
      confidence: hint
    patterns:
      - pattern-inside: |
          import { ..., GestureDetector, Gesture } from "react-native-gesture-handler";
          ...
      - pattern-either:
          - patterns:
              - pattern: <GestureDetector gesture={$G}>...</GestureDetector>
              - metavariable-regex:
                  metavariable: $G
                  regex: "^(?!.*Gesture\\.(Pan|Pinch|Fling|Rotation|LongPress|ForceTouch|Manual|Native)).*Gesture\\.Tap\\("
          - patterns:
              - pattern: <GestureDetector gesture={$G} />
              - metavariable-regex:
                  metavariable: $G
                  regex: "^(?!.*Gesture\\.(Pan|Pinch|Fling|Rotation|LongPress|ForceTouch|Manual|Native)).*Gesture\\.Tap\\("
