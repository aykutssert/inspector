rules:
  - id: rn-no-legacy-shadow-styles
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      The iOS-only shadow* style properties (shadowColor, shadowOffset, shadowRadius,
      shadowOpacity) do not work on Android or with the New Architecture.
      Use the cross-platform boxShadow string property instead:
      boxShadow: '0 2px 8px rgba(0,0,0,0.15)'
    metadata:
      category: compatibility
      confidence: hint
    pattern-either:
      - pattern: |
          <$TAG ... style={{ shadowColor: $VAL }} ... />
      - pattern: |
          <$TAG ... style={{ shadowColor: $VAL }} ...>...</$TAG>
      - pattern: |
          StyleSheet.create({ $KEY: { shadowColor: $VAL } })
