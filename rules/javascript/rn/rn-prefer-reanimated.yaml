rules:
  - id: rn-prefer-reanimated
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      React Native's Animated API runs on the JavaScript thread, which causes dropped
      frames under heavy JS workloads. Replace with react-native-reanimated which executes
      animations on the UI thread: useSharedValue, useAnimatedStyle, withTiming, withSpring.
    metadata:
      category: performance
      confidence: hint
    pattern-either:
      - pattern: new Animated.Value($X)
      - pattern: Animated.timing($VAL, $CONF)
      - pattern: Animated.spring($VAL, $CONF)
      - pattern: Animated.decay($VAL, $CONF)
      - pattern: Animated.loop($ANIM)
      - pattern: Animated.sequence($ANIMS)
      - pattern: Animated.parallel($ANIMS)
