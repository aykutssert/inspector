    React cache() or React.cache() called inside a function/class body. Calling cache() inside a component, hook, or function body recreates the cache instance on every invocation/render, completely defeating the memoization. Define the cached function at the module scope instead.
  bad: |
    # See `scout explain server.server-cache-with-object-literal` for code example
  good: |
    # See `scout explain server.server-cache-with-object-literal` for code example
  fix: |
    React cache() or React.

- id: server.server-dedup-props
  why: |
    JSON.stringify() used as a JSX prop value. Passing serialized data as a string prop forces the client to JSON.parse() it manually. Pass the raw value directly — React serializes Server Component props automatically. If the raw prop is also passed alongside the JSON version, remove the duplicate.
  bad: |
    # See `scout explain server.server-dedup-props` for code example
  good: |
    # See `scout explain server.server-dedup-props` for code example
  fix: |
    JSON.

- id: server.server-fetch-without-revalidate
  why: |
    fetch() inside a server handler without cache or revalidation configuration. In Next.js App Router, fetched data is cached by default (equivalent to cache: 'force-cache'). If this data should be fresh on every request, add cache: 'no-store' or next: { revalidate: 0 }.
  bad: |
    # See `scout explain server.server-fetch-without-revalidate` for code example
  good: |
    # See `scout explain server.server-fetch-without-revalidate` for code example
  fix: |
    fetch() inside a server handler without cache or revalidation configuration.

- id: server.server-hoist-static-io
  why: |
    Static file read inside a function body. Reading a file that never changes (config, templates, etc.) on every invocation is wasteful. Move the read to module scope so it runs once at startup.
  bad: |
    # See `scout explain server.server-hoist-static-io` for code example
  good: |
    # See `scout explain server.server-hoist-static-io` for code example
  fix: |
    Static file read inside a function body.

- id: tanstack-start.tanstack-start-get-mutation
  why: |
    GET serverFn detected. GET requests should be idempotent and safe — they should not create, update, or delete data. If this handler mutates data, change the method to POST to prevent CSRF vulnerabilities via prefetching.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-get-mutation` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-get-mutation` for code example
  fix: |
    GET serverFn detected.

- id: tanstack-start.tanstack-start-missing-head-content
  why: |
    Root route component missing <HeadContent />. TanStack Start requires <HeadContent /> in the root route component to render <title> and other head elements defined by child routes. Without it, meta tags are silently dropped during rendering.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-missing-head-content` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-missing-head-content` for code example
  fix: |
    Root route component missing <HeadContent />.

- id: tanstack-start.tanstack-start-no-direct-fetch-in-loader
  why: |
    Direct fetch() call inside a TanStack Start route loader. Loaders run on the client during navigation; using fetch() directly creates client-side waterfalls and bypasses server-side data fetching. Wrap the call in createServerFn() so it runs on the server with full Node.js access.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-no-direct-fetch-in-loader` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-no-direct-fetch-in-loader` for code example
  fix: |
    Direct fetch() call inside a TanStack Start route loader.

- id: tanstack-start.tanstack-start-no-dynamic-server-fn-import
  why: |
    Dynamic import() inside a serverFn handler or route. Dynamic imports of serverFn break the RPC stub that TanStack Start generates at build time. Use a static import at the top of the file instead.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-no-dynamic-server-fn-import` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-no-dynamic-server-fn-import` for code example
  fix: |
    Dynamic import() inside a serverFn handler or route.

- id: tanstack-start.tanstack-start-no-navigate-in-render
  why: |
    navigate() called in component render body instead of a route loader or user event handler. Call redirect() in the route's loader for declarative redirects, or place navigate() inside an event handler / useEffect.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-no-navigate-in-render` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-no-navigate-in-render` for code example
  fix: |
    navigate() called in component render body instead of a route loader or user event handler.

- id: tanstack-start.tanstack-start-no-secrets-in-loader
  why: |
    Secret environment variable accessed inside a TanStack Start route loader. Route loaders can be compiled into the client bundle, which would expose the secret. Move secret access into a createServerFn() to guarantee server-only execution.
  bad: |
    const API_KEY = "sk-12345..."
  good: |
    const API_KEY = process.env.API_KEY
  fix: |
    Move secrets to environment variables.

- id: tanstack-start.tanstack-start-no-use-server-in-handler
  why: |
    "use server" is redundant inside a createServerFn().handler() callback. TanStack Start automatically creates a server boundary at the handler boundary — the directive has no effect here and misleads readers. Remove it.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-no-use-server-in-handler` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-no-use-server-in-handler` for code example
  fix: |
    "use server" is redundant inside a createServerFn().

- id: tanstack-start.tanstack-start-no-useeffect-fetch
  why: |
    useEffect + fetch() used for data fetching in a TanStack Start route component. TanStack Router provides a loader function that runs before the component renders, eliminating this pattern and preventing client-side waterfalls. Move the fetch call to the route's loader and access data via useLoaderData().
  bad: |
    # See `scout explain tanstack-start.tanstack-start-no-useeffect-fetch` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-no-useeffect-fetch` for code example
  fix: |
    useEffect + fetch() used for data fetching in a TanStack Start route component.

- id: tanstack-start.tanstack-start-redirect-in-try-catch
  why: |
    Calling 'redirect()' or 'notFound()' inside a try-catch block can prevent the navigation from working correctly because TanStack Router uses thrown errors internally to redirect or show a 404 page. Call redirect() outside the try-catch block or rethrow the exception.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-redirect-in-try-catch` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-redirect-in-try-catch` for code example
  fix: |
    Calling 'redirect()' or 'notFound()' inside a try-catch block can prevent the navigation from working correctly because TanStack Router uses thrown errors internally to redirect or show a 404 page.

- id: tanstack-start.tanstack-start-server-fn-method-order
  why: |
    createServerFn() chain has .handler() before .validator(). The correct order is createServerFn().validator(schema).handler(fn) — calling .handler() first means the validator schema is attached after the handler is already set, so input validation does not run.
  bad: |
    # See `scout explain tanstack-start.tanstack-start-server-fn-method-order` for code example
  good: |
    # See `scout explain tanstack-start.tanstack-start-server-fn-method-order` for code example
  fix: |
    createServerFn() chain has .

- id: tanstack-start.tanstack-start-serverfn-missing-csrf-middleware
  why: |
    createServerFn() in this file does not use CSRF middleware. TanStack Start recommends createCsrfMiddleware() to protect against cross-site request forgery on state-changing endpoints.
  bad: |
    createServerFn().handler(...)  // no CSRF middleware
  good: |
    // In router config: createCsrfMiddleware();
  fix: |
    Add createCsrfMiddleware() to your router configuration.

- id: tanstack-start.tanstack-start-serverfn-missing-input-validator
  why: |
    createServerFn() chain missing .inputValidator(schema). Without input validation, untrusted client data reaches the server function unchecked, opening the route to injection and type-confusion attacks. TanStack Start docs show inputValidator as the standard contract.
  bad: |
    createServerFn().handler(async () => { ... })
  good: |
    createServerFn().validator(schema).handler(async ({ input }) => { ... })
  fix: |
    Add .inputValidator() or .validator() before .handler().

- id: tanstack.query-no-query-in-effect
  why: |
    Calling refetch() inside useEffect couples your query trigger to React's rendering lifecycle. When the queryKey or 'enabled' option changes, TanStack Query re-fetches automatically — useEffect + refetch() is rarely the right pattern and introduces race conditions and double-fetching.
  bad: |
    # See `scout explain tanstack.query-no-query-in-effect` for code example
  good: |
    # See `scout explain tanstack.query-no-query-in-effect` for code example
  fix: |
    Calling refetch() inside useEffect couples your query trigger to React's rendering lifecycle.

- id: tanstack.query-no-rest-destructuring
  why: |
    Rest/spread destructuring from useQuery subscribes to every query state field (isFetching, isStale, dataUpdatedAt, ...), causing a re-render whenever any of them changes. Destructure only what you use: const { data, isLoading, error } = useQuery(...).
  bad: |
    # See `scout explain tanstack.query-no-rest-destructuring` for code example
  good: |
    # See `scout explain tanstack.query-no-rest-destructuring` for code example
  fix: |
    Rest/spread destructuring from useQuery subscribes to every query state field (isFetching, isStale, dataUpdatedAt, .

- id: tanstack.query-no-usequery-for-mutation
  why: |
    useQuery is executing an HTTP write operation. Queries are designed for idempotent reads and may refetch automatically; POST, PUT, PATCH, and DELETE belong in useMutation so retries, pending state, and cache updates follow mutation semantics.
  bad: |
    # See `scout explain tanstack.query-no-usequery-for-mutation` for code example
  good: |
    # See `scout explain tanstack.query-no-usequery-for-mutation` for code example
  fix: |
    useQuery is executing an HTTP write operation.

- id: tanstack.query-no-void-query-fn
  why: |
    This TanStack Query queryFn has a block body but returns no value. Query functions must resolve data; resolving undefined breaks the cache contract and is rejected by current TanStack Query versions. Return the fetched value or throw an error.
  bad: |
    # See `scout explain tanstack.query-no-void-query-fn` for code example
  good: |
    # See `scout explain tanstack.query-no-void-query-fn` for code example
  fix: |
    This TanStack Query queryFn has a block body but returns no value.

- id: tanstack.query-stable-query-client
  why: |
    QueryClient is created inside a React component or hook, so a new cache can be created on each render. Create it once at module scope, or lazily store it in useState/useRef before passing it to QueryClientProvider.
  bad: |
    # See `scout explain tanstack.query-stable-query-client` for code example
  good: |
    # See `scout explain tanstack.query-stable-query-client` for code example
  fix: |
    QueryClient is created inside a React component or hook, so a new cache can be created on each render.

- id: tanstack.tanstack-mutation-without-invalidation
  why: |
    useMutation is called without cache invalidation or update. When performing a mutation, you should invalidate relevant query caches using queryClient.invalidateQueries() or update query data using queryClient.setQueryData() in onSuccess or onSettled callbacks. Otherwise, the user interface will remain stale and won't reflect the server-side changes.
  bad: |
    # See `scout explain tanstack.tanstack-mutation-without-invalidation` for code example
  good: |
    # See `scout explain tanstack.tanstack-mutation-without-invalidation` for code example
  fix: |
    useMutation is called without cache invalidation or update.

- id: tanstack.tanstack-nonserializable-query-key
  why: |
    TanStack Query key contains a non-serializable value. Functions, Date, Map, Set, or class instances can make cache identity unstable or hard to invalidate consistently. Use primitive values or plain serializable objects in query keys.
  bad: |
    # See `scout explain tanstack.tanstack-nonserializable-query-key` for code example
  good: |
    # See `scout explain tanstack.tanstack-nonserializable-query-key` for code example
  fix: |
    TanStack Query key contains a non-serializable value.

- id: tanstack.tanstack-query-key-string
  why: |
    TanStack Query key uses an inline string literal. Repeating raw strings across useQuery, setQueryData, and invalidateQueries makes cache updates easy to mistype or drift. Prefer a query-key factory or shared constant so reads and invalidations use the same key shape.
  bad: |
    # See `scout explain tanstack.tanstack-query-key-string` for code example
  good: |
    # See `scout explain tanstack.tanstack-query-key-string` for code example
  fix: |
    TanStack Query key uses an inline string literal.

- id: tanstack.tanstack-query-missing-staletime
  why: |
    useQuery is called without specifying a staleTime. By default, staleTime is 0, which means queries are instantly considered stale. For server-side rendered (SSR) or prefetched data, this causes an immediate client-side refetch upon hydration, resulting in duplicate network requests and potential screen flickering. Set a staleTime (e.g. staleTime: 1000 * 60 * 5) to cache and reuse the hydrated data.
  bad: |
    # See `scout explain tanstack.tanstack-query-missing-staletime` for code example
  good: |
    # See `scout explain tanstack.tanstack-query-missing-staletime` for code example
  fix: |
    useQuery is called without specifying a staleTime.

- id: view-transitions.no-document-start-view-transition
  why: |
    Direct document.startViewTransition() call bypasses React's concurrent rendering. In React 19+ use the built-in <ViewTransition> component or wrap state updates with startTransition() / flushSync() correctly. Direct DOM calls can conflict with React's reconciler and cause flicker or missed transitions.
  bad: |
    # See `scout explain view-transitions.no-document-start-view-transition` for code example
  good: |
    # See `scout explain view-transitions.no-document-start-view-transition` for code example
  fix: |
    Direct document.

- id: view-transitions.no-flush-sync
  why: |
    Avoid using flushSync() to force synchronous updates. flushSync() bypasses React's concurrent rendering optimization and triggers synchronous, blocking layout passes. If integrating with View Transitions, use React 19's native startTransition support instead.
  bad: |
    # See `scout explain view-transitions.no-flush-sync` for code example
  good: |
    # See `scout explain view-transitions.no-flush-sync` for code example
  fix: |
    Avoid using flushSync() to force synchronous updates.

- id: vite.vite-insecure-config
  why: |
    Vite dev server is configured to listen on all interfaces. This can expose local development services to the LAN or container network. Bind to localhost unless remote device testing is intentional, and document the reason when host: true is required.
  bad: |
    # See `scout explain vite.vite-insecure-config` for code example
  good: |
    # See `scout explain vite.vite-insecure-config` for code example
  fix: |
    Vite dev server is configured to listen on all interfaces.

- id: vite.vite-process-env-usage
  why: |
    process.env should not be used in a Vite project. Vite does not inject process.env by default, which can cause runtime ReferenceErrors (process is not defined) in the browser. Use import.meta.env instead.
  bad: |
    # See `scout explain vite.vite-process-env-usage` for code example
  good: |
    # See `scout explain vite.vite-process-env-usage` for code example
  fix: |
    process.

- id: vite.vite-public-secret-prefix
  why: |
    A VITE_* environment variable is named like a secret. Vite exposes every VITE_* value to client-side code, so tokens, passwords, private keys, and credentials with this prefix are shipped to the browser. Rename real secrets without the VITE_ prefix and read them only on the server.
  bad: |
    const API_KEY = "sk-12345..."
  good: |
    const API_KEY = process.env.API_KEY
  fix: |
    Move secrets to environment variables.

- id: no-derived-state
  why: |
    State derived from props or other state should be computed during render, not stored in useState. Derived state causes synchronization bugs when the source changes but the derived value is not updated.
  bad: |
    const [fullName, setFullName] = useState(firstName + " " + lastName)
  good: |
    const fullName = firstName + " " + lastName
  fix: |
    Compute the value directly during render instead of storing it in state.

- id: setstate-in-effect-without-deps
  why: |
    Calling setState in useEffect without specifying dependencies causes the effect to run on every render, creating an infinite loop.
  bad: |
    useEffect(() => { setCount(count + 1) })
  good: |
    useEffect(() => { setCount(count + 1) }, [count])
  fix: |
    Add the relevant state variables to the dependency array.

- id: react-useeffect-fetch-suggest-query
  why: |
    Fetching data inside useEffect is error-prone: you must handle loading/error states, race conditions, and cleanup manually. A query library (TanStack Query, SWR) handles these automatically.
  bad: |
    useEffect(() => { fetch("/api/data").then(setData) }, [])
  good: |
    const { data } = useQuery({ queryKey: ["data"], queryFn: () => fetch("/api/data").then(r => r.json()) })
  fix: |
    Replace useEffect fetch with useQuery or similar data-fetching hook.

- id: react-useeffect-missing-cleanup
  why: |
    useEffect without cleanup can cause memory leaks, stale closure execution, or state updates on unmounted components. Subscriptions, timers, and async operations must be cleaned up.
  bad: |
    useEffect(() => { sub = source.subscribe(setData) }, [])
  good: |
    useEffect(() => { const sub = source.subscribe(setData); return () => sub.unsubscribe() }, [])
  fix: |
    Return a cleanup function from the effect callback.

- id: no-initialize-state
  why: |
    useState with a static initial value that never changes should be a regular constant or computed inline. The state initializer function adds unnecessary overhead.
  bad: |
    const [name] = useState("default")
  good: |
    const name = "default"
  fix: |
    Use a plain const if the value never changes.

- id: no-mutable-in-deps
  why: |
    Mutable objects and arrays in dependency arrays break referential comparison: they are a new reference on every render, causing the effect to re-run continuously.
  bad: |
    useEffect(() => { }, [someObject])
  good: |
    useEffect(() => { }, [someObject.id])
  fix: |
    Use primitive values or stable references in dependency arrays.

- id: prefer-use-reducer
  why: |
    Multiple related useState calls that are always updated together should be combined into useReducer for predictable state transitions.
  bad: |
    const [name, setName] = useState(""); const [age, setAge] = useState(0)
  good: |
    const [state, dispatch] = useReducer(reducer, { name: "", age: 0 })
  fix: |
    Combine related state variables into a useReducer.

- id: prefer-use-sync-external-store
  why: |
    Subscribing to an external store (Redux, Zustand, etc.) in useEffect is fragile. useSyncExternalStore provides a tear-free, concurrent-mode-safe subscription.
  bad: |
    useEffect(() => store.subscribe(() => setState(store.getState())), [])
  good: |
    const state = useSyncExternalStore(store.subscribe, store.getState)
  fix: |
    Replace manual subscription with useSyncExternalStore.

- id: no-cascading-set-state
  why: |
    Calling setState right after another setState in the same render causes cascading re-renders. Both should be batched into a single update.
  bad: |
    setCount(c + 1); setName("x")
  good: |
    setState({ count: c + 1, name: "x" })
  fix: |
    Combine multiple state updates into a single setState or use useReducer.

- id: no-self-updating-effect
  why: |
    An effect that updates a state variable it depends on creates an infinite loop. The dependency causes the effect to re-run, which updates the state again.
  bad: |
    useEffect(() => { setCount(c + 1) }, [count])
  good: |
    Derive the value from props or use an event handler instead.
  fix: |
    Remove the state update from the effect, or remove the state from deps.

- id: no-effect-chain
  why: |
    An effect that triggers a state update that triggers another effect (chain) is hard to reason about and causes extra re-renders. Combine into a single effect.
  bad: |
    useEffect(() => { setA(x) }, [x]); useEffect(() => { setB(a) }, [a])
  good: |
    useEffect(() => { setA(x); setB(compute(x)) }, [x])
  fix: |
    Merge the chained effects into one, or derive the second value from the source.

- id: no-event-handler
  why: |
    A function named like an event handler (onClick, onSubmit) is called inside the render body instead of being passed as a prop. This calls the function on every render.
  bad: |
    return <button onClick={handleClick()}>Click</button>
  good: |
    return <button onClick={handleClick}>Click</button>
  fix: |
    Pass the function reference, not the function call result.

- id: no-event-trigger-state
  why: |
    Calling setState inside an event handler is correct, but the handler reads a stale closure value if the dependency is not in the closure. Use functional update or ref.
  bad: |
    const handleClick = () => setCount(count + 1)
  good: |
    const handleClick = () => setCount(prev => prev + 1)
  fix: |
    Use functional setState form: setCount(prev => prev + 1).

- id: no-effect-event-handler
  why: |
    An effect should not contain event handler logic. Event handlers belong in the component body, not in effects.
  bad: |
    useEffect(() => { window.addEventListener("click", handler) }, [])
  good: |
    useEffect(() => { window.addEventListener("click", handler); return () => window.removeEventListener("click", handler) }, [])
  fix: |
    Place event handlers in the effect with proper cleanup.

- id: no-pass-data-to-parent
  why: |
    A child component calling a parent callback to pass data up creates tight coupling. Consider lifting state or using a shared store.
  bad: |
    function Child({ onData }) { useEffect(() => onData(localData), [localData]) }
  good: |
    Manage shared state at the parent level and pass it down.
  fix: |
    Lift state to the common ancestor or use context.

- id: no-adjust-state-on-prop-change
  why: |
    Adjusting state when a prop changes is fragile and causes extra renders. Derive the value from the prop directly during render.
  bad: |
    useEffect(() => setFormData(prop.data), [prop.data])
  good: |
    const formData = prop.data ?? defaultFormData
  fix: |
    Derive values from props during render instead of syncing via effect.

- id: no-chain-state-updates
  why: |
    Chaining setState calls that each depend on the previous update is fragile and causes cascading renders. Batch into a single update.
  bad: |
    setPage(c + 1); setUrl(getUrlForPage(c + 1))
  good: |
    const next = c + 1; setPage(next); setUrl(getUrlForPage(next))
  fix: |
    Compute all values first, then update together or use useReducer.

- id: no-prop-callback-in-effect
  why: |
    Calling a prop callback inside useEffect hides it from React DevTools and makes the component harder to test.
  bad: |
    useEffect(() => { onComplete(data) }, [data])
  good: |
    Call onComplete from an event handler or useInsertionEffect.
  fix: |
    Move the callback call to an event handler or useLayoutEffect.

- id: no-reset-all-state-on-prop-change
  why: |
    Resetting all state when a single prop changes is wasteful and may cause data loss. Only reset the state that depends on the changed prop.
  bad: |
    useEffect(() => { setName(""); setAge(0); setEmail("") }, [userId])
  good: |
    Only reset state that depends on userId.
  fix: |
    Selectively reset only the state values that depend on the changed prop.

- id: no-pass-live-state-to-parent
  why: |
    Passing frequently-changing state to a parent via callback causes excessive parent re-renders. Use ref or context instead.
  bad: |
    useEffect(() => { onPositionChange(pos) }, [pos])
  good: |
    Use ref to track position and read it synchronously, or use context.
  fix: |
    Use useRef or context for values that change rapidly.

- id: god-component
  why: |
    A component with too many hooks, effects, or responsibilities should be split into smaller focused components for testability and maintainability.
  bad: |
    function Page() { const [a, setA] = useState(); const [b, setB] = useState(); ... 20 more lines }
  good: |
    function Page() { return <Header/><Content/><Footer/> }
  fix: |
    Extract independent UI sections and their hooks into separate components.

- id: component-splitting
  why: |
    A component renders many JSX branches or handles too many states. Splitting into sub-components improves readability and testability.
  bad: |
    function Card({ type }) { if (type === "a") return <A/>; if (type === "b") return <B/>; ... }
  good: |
    function Card({ type }) { return components[type] ?? <Default/> }
  fix: |
    Extract each branch into its own component.

- id: prefer-stable-empty-fallback
  why: |
    An inline empty array/object as fallback creates a new reference every render, breaking memoization.
  bad: |
    const items = data ?? []
  good: |
    const EMPTY = []; const items = data ?? EMPTY
  fix: |
    Hoist fallback values to module-level consts.

- id: memoized-child-unstable-prop
  why: |
    A memoized child component receives an unstable prop reference (inline object, arrow function) that breaks memoization on every render.
  bad: |
    <MemoChild onClick={() => handleClick(id)} />
  good: |
    <MemoChild onClick={handleClick} />
  fix: |
    Use useCallback or hoist the function/object to a stable reference.

- id: callback-prop-not-invoked
  why: |
    A prop named like a callback (onX) is passed to a child but never invoked. The child either ignores it or the prop is unused.
  bad: |
    function Child({ onSubmit }) { return <div/> }
  good: |
    function Child({ onSubmit }) { return <button onClick={onSubmit}>Save</button> }
  fix: |
    Call the callback prop at the appropriate event, or remove it.

- id: deep-prop-drilling
  why: |
    Props passed through multiple intermediate components (3+) that do not use them create coupling and make refactoring harder. Use context or composition.
  bad: |
    <App><Nav user={user}/></App> <Nav><Avatar src={user.avatar}/></Nav>
  good: |
    Provide user via React Context or component composition.
  fix: |
    Replace prop drilling with React Context or composition.

- id: render-time-allocation
  why: |
    Allocating objects, arrays, or closures during render (inline) creates garbage for the GC every render. Hoist or memoize stable values.
  bad: |
    return <div style={{ color: "red" }}>
  good: |
    const style = { color: "red" }; return <div style={style}>
  fix: |
    Hoist stable objects/arrays to module scope or use useMemo.

- id: no-render-in-render
  why: |
    Calling a render function (component) inside another render function causes React to create a new component type every render, losing state.
  bad: |
    function Parent() { const C = <Sub/>; return C }
  good: |
    function Parent() { return <Sub/> }  // Sub defined at module scope
  fix: |
    Define components at module scope, never inside another component.

- id: no-polymorphic-children
  why: |
    A component that renders different child types based on a prop creates a rigid interface that is hard to extend. Use slots or composition.
  bad: |
    function Card({ variant }) { return variant === "a" ? <A/> : <B/> }
  good: |
    function Card({ children }) { return <div>{children}</div> }
  fix: |
    Accept children directly and let the parent decide the content.

- id: no-render-prop-children
  why: |
    A render prop deeper than one level creates nested function scopes that are hard to read and test. Extract into a named component.
  bad: |
    <DataProvider render={data => <Form render={form => <div/>}/>}/>
  good: |
    Extract the inner render logic into a named component.
  fix: |
    Create an intermediate named component instead of deeply nested render props.

- id: em-dash-in-jsx-text
  why: |
    Using em dash or other typographic characters in JSX text may not render correctly across all browsers.
  bad: |
    <p>Price — $10</p>
  good: |
    <p>Price &mdash; $10</p>
  fix: |
    Use HTML entities (&mdash;) instead of literal typographic characters.

- id: rerender-defer-reads-hook
  why: |
    Calling searchParams.get() (or similar hook methods) in render body causes re-renders when search params change. Move to event handlers.
  bad: |
    const value = searchParams.get("key")  // in render body
  good: |
    const handleClick = () => { const value = searchParams.get("key"); ... }
  fix: |
    Move searchParams.get() calls into event handlers, not render body.

- id: rerender-derived-state-from-hook
  why: |
    An addEventListener inside a component body subscribes to scroll/resize/mousemove events. Calling setState directly in the handler causes rapid re-renders.
  bad: |
    useEffect(() => { window.addEventListener("scroll", () => setScrollY(window.scrollY)) }, [])
  good: |
    useEffect(() => { const handler = throttle(() => setScrollY(window.scrollY), 100); ... }, [])
  fix: |
    Debounce or throttle the event handler to limit state update frequency.

- id: no-usememo-simple-expression
  why: |
    useMemo wrapping a simple expression (string concat, math, ternary) adds overhead without benefit.
  bad: |
    const name = useMemo(() => first + " " + last, [first, last])
  good: |
    const name = first + " " + last
  fix: |
    Remove useMemo for simple, cheap computations.

- id: rendering-hoist-jsx
  why: |
    Conditional JSX inside a component re-creates the element tree on every render. Hoisting conditions to separate components improves readability.
  bad: |
    return <div>{isLoading ? <Spinner/> : <Content/>}</div>
  good: |
    if (isLoading) return <Spinner/>; return <Content/>
  fix: |
    Use early returns for conditional rendering branches.

- id: rendering-usetransition-loading
  why: |
    Using startTransition without isPending leaves the UI in an unresponsive state during the transition.
  bad: |
    startTransition(() => setTab("settings"))
  good: |
    const [isPending, startTransition] = useTransition(); startTransition(() => setTab("settings"))
  fix: |
    Use useTransition to get isPending and show a loading state.

- id: rerender-memo-before-early-return
  why: |
    A memoized child component renders after an early return, wasting the memoization when the early return is hit.
  bad: |
    return <MemoChild/>; if (loading) return null
  good: |
    if (loading) return null; return <MemoChild/>
  fix: |
    Move early returns before expensive (memoized) child components.

- id: rendering-hydration-no-flicker
  why: |
    A hydration mismatch between server and client causes React to re-render the entire subtree, causing a flicker.
  bad: |
    return <div>{typeof window === "undefined" ? "SSR" : "CSR"}</div>
  good: |
    Use suppressHydrationWarning or useEffect to update after mount.
  fix: |
    Ensure server and client render identical HTML.

- id: rerender-transitions-scroll
  why: |
    Scroll event listeners attached during render fire on every frame during a transition, causing jank.
  bad: |
    window.addEventListener("scroll", handleScroll)  // in render body
  good: |
    useEffect(() => { window.addEventListener("scroll", handleScroll); return () => window.removeEventListener(...) }, [])
  fix: |
    Attach scroll listeners in useEffect with cleanup.

- id: advanced-event-handler-refs
  why: |
    Using useRef to pass state to an event handler avoids stale closures but adds complexity.
  bad: |
    const ref = useRef(val); ref.current = val; window.addEventListener("scroll", () => useRef(ref.current))
  good: |
    const handler = useCallback(() => setVal(val + 1), [val])
  fix: |
    Prefer useCallback over ref-based event handlers when possible.

- id: nestjs.circular-module-dep
  why: |
    A circular dependency in @Module imports creates tight coupling between modules and can cause DI initialization failures. NestJS resolves imports sequentially, and a cycle may lead to undefined providers.
  bad: |
    @Module({ imports: [BModule] }) export class AModule {}; @Module({ imports: [AModule] }) export class BModule {}
  good: |
    @Module({ imports: [forwardRef(() => BModule)] }) export class AModule {}; @Module({ imports: [forwardRef(() => AModule)] }) export class BModule {}
  fix: |
    Use forwardRef(() => Module) in at least one module to break the cycle.

- id: nestjs.provider-not-registered
  why: |
    A class injected into a module's controller or provider is not registered in any provider array of the module or its imports. NestJS will throw at runtime.
  bad: |
    constructor(private readonly userService: UserService) {}  // UserService not in providers
  good: |
    @Module({ providers: [UserService] })
  fix: |
    Add the missing provider to the module's providers array.

- id: repeated-magic-literal
  why: |
    The same string or number literal appears in multiple places, making the code harder to maintain. Extract to a named constant.
  bad: |
    if (status === "active") ...; if (role === "active") ...
  good: |
    const ACTIVE = "active"; if (status === ACTIVE) ...; if (role === ACTIVE) ...
  fix: |
    Extract the repeated literal to a module-level const.

- id: non-null-assertion-spam
  why: |
    Using ! (non-null assertion) heavily suggests that the types are incorrect. Fix the types instead of suppressing them.
  bad: |
    user!.name!.toUpperCase()
  good: |
    user?.name?.toUpperCase()
  fix: |
    Use optional chaining or proper type narrowing.

- id: sequential-awaits-independent
  why: |
    Two sequential awaits where the second does not depend on the first result run slower than Promise.all.
  bad: |
    const a = await fetchA(); const b = await fetchB()
  good: |
    const [a, b] = await Promise.all([fetchA(), fetchB()])
  fix: |
    Wrap independent promises in Promise.all.

- id: god-class
  why: |
    A class with too many methods and properties accumulates multiple responsibilities.
  bad: |
    class UserService { create() {} read() {} update() {} delete() {} validate() {} ... }
  good: |
    class UserCreator {} class UserReader {} class UserNotifier {}
  fix: |
    Split the class into smaller single-responsibility classes.

- id: large-function
  why: |
    A function that is too long (exceeds 60 lines) is hard to read, test, and maintain.
  bad: |
    function process(data) { // 80 lines of logic }
  good: |
    function process(data) { validate(data); transform(data); persist(data) }
  fix: |
    Extract cohesive blocks of logic into separate named functions.

- id: js-batch-dom-css
  why: |
    Reading and writing to DOM in alternating order causes layout trashing.
  bad: |
    el.style.width = "100px"; const h = el.offsetHeight; el.style.height = h + "px"
  good: |
    const h = el.offsetHeight; el.style.width = "100px"; el.style.height = h + "px"
  fix: |
    Group all DOM reads together before any DOM writes.

- id: js-length-check-first
  why: |
    Checking .length before a .find() or .filter() is redundant.
  bad: |
    if (items.length > 0) { return items.find(f) }
  good: |
    return items.find(f)
  fix: |
    Remove the redundant length check.

- id: js-early-map-no-check
  why: |
    Using .map() without checking if the array is defined causes a runtime error.
  bad: |
    items.map(i => i.name)  // items may be undefined
  good: |
    (items ?? []).map(i => i.name)
  fix: |
    Add a nullish fallback before .map().

- id: js-cache-property-access
  why: |
    Accessing the same deeply nested property repeatedly is wasteful.
  bad: |
    if (obj.a.b.c) { process(obj.a.b.c) }
  good: |
    const val = obj.a.b.c; if (val) { process(val) }
  fix: |
    Cache repeated property accesses in a local variable.

- id: async-defer-await
  why: |
    Awaits inside a loop execute sequentially. Use Promise.all with map to parallelize independent async operations.
  bad: |
    for (const item of items) { await process(item) }
  good: |
    await Promise.all(items.map(process))
  fix: |
    Replace sequential awaits in loop with Promise.all.

- id: no-generic-handler-names
  why: |
    Generic handler names like handleClick, onPress, handleSubmit provide no information about what the handler does.
  bad: |
    const handleClick = () => submitOrder()
  good: |
    const handleSubmitOrder = () => submitOrder()
  fix: |
    Name handlers after the action they perform.

- id: js-combine-iterations
  why: |
    Two loops over the same array can be combined into a single pass for better cache locality.
  bad: |
    items.forEach(a => total += a); items.forEach(b => count++)
  good: |
    items.forEach(item => { total += item; count++ })
  fix: |
    Merge the two loops into one iteration.

- id: js-async-reduce-without-awaited-acc
  why: |
    Using async reduce without awaiting the accumulator leads to a bug.
  bad: |
    const result = await items.reduce(async (acc, i) => [...(await acc), await process(i)], [])
  good: |
    const result = []; for (const i of items) { result.push(await process(i)) }
  fix: |
    Use a for-of loop with await instead of async reduce.

- id: js-cache-storage
  why: |
    Accessing localStorage/sessionStorage synchronously blocks the main thread.
  bad: |
    const token = localStorage.getItem("token")  // called repeatedly
  good: |
    let _token; function getToken() { if (!_token) _token = localStorage.getItem("token"); return _token }
  fix: |
    Cache storage reads in a module-level variable.

- id: js-hoist-intl
  why: |
    Intl formatters are expensive to construct. Hoist to module scope.
  bad: |
    function formatPrice(p) { return new Intl.NumberFormat("en-US", { style: "currency" }).format(p) }
  good: |
    const currencyFmt = new Intl.NumberFormat("en-US", { style: "currency" }); function formatPrice(p) { return currencyFmt.format(p) }
  fix: |
    Hoist the Intl formatter to module scope.

- id: js-hoist-regexp
  why: |
    new RegExp() inside a function recompiles the pattern on every call.
  bad: |
    function match(pattern, s) { return new RegExp(pattern).test(s) }
  good: |
    const RE = /^pattern$/; function match(s) { return RE.test(s) }
  fix: |
    Hoist the RegExp to module scope.

- id: js-index-maps
  why: |
    Searching an array with .find() on every access is O(n). Build a Map for O(1) lookups.
  bad: |
    items.find(i => i.id === target)  // called in a loop
  good: |
    const byId = new Map(items.map(i => [i.id, i]))
  fix: |
    Build a Map keyed by the lookup field before the loop.

- id: js-set-map-lookups
  why: |
    Checking .includes() on an array repeatedly is O(n). Use a Set for O(1) membership tests.
  bad: |
    const allowed = ["a", "b", "c"]; items.filter(i => allowed.includes(i))
  good: |
    const allowed = new Set(["a", "b", "c"]); items.filter(i => allowed.has(i))
  fix: |
    Replace array .includes() with Set .has().

- id: prefer-module-scope-static-value
  why: |
    A const inside a function that does not depend on any parameter or local state should be hoisted to module scope.
  bad: |
    function f() { const TAX_RATE = 0.18; return amount * TAX_RATE }
  good: |
    const TAX_RATE = 0.18; function f(amount) { return amount * TAX_RATE }
  fix: |
    Hoist static constants to module scope.

- id: prefer-module-scope-pure-function
  why: |
    A function that does not capture any local variables can be hoisted to module scope, avoiding re-creation on every render.
  bad: |
    function C() { const fn = () => 42; return <div>{fn()}</div> }
  good: |
    const fn = () => 42; function C() { return <div>{fn()}</div> }
  fix: |
    Hoist pure functions to module scope.

- id: rn-no-image-children
  why: |
    React Native Image component does not support children. Nested elements will not be rendered.
  bad: |
    <Image source={src}><Text>Caption</Text></Image>
  good: |
    <ImageBackground source={src}><Text>Caption</Text></ImageBackground>
  fix: |
    Replace Image with ImageBackground if you need children.

- id: rn-bare-string-outside-text
  why: |
    String literals directly inside a View or other non-Text component will not render and cause warnings.
  bad: |
    <View>Hello</View>
  good: |
    <View><Text>Hello</Text></View>
  fix: |
    Wrap string literals in Text components.

- id: rn-list-data-mapped
  why: |
    A FlatList or ScrollView without a .map() on data suggests static content.
  bad: |
    <FlatList data={undefined} renderItem={...} />
  good: |
    <FlatList data={items} renderItem={({ item }) => <Item data={item} />} />
  fix: |
    Pass the data array to FlatList.

- id: rn-list-callback-per-row
  why: |
    Creating a new function inside renderItem creates a new closure on every render, breaking memoization for list rows.
  bad: |
    renderItem={({ item }) => <Row onPress={() => handlePress(item.id)} />}
  good: |
    const handlePress = useCallback((id) => { ... }, []); renderItem={({ item }) => <Row onPress={handlePress} />}
  fix: |
    Hoist the onPress handler outside renderItem.

- id: rn-no-scrollview-mapped-list
  why: |
    Using ScrollView with a .map() of dynamic data should use FlatList for better virtualization.
  bad: |
    <ScrollView>{items.map(i => <Item key={i.id} data={i} />)}</ScrollView>
  good: |
    <FlatList data={items} renderItem={({ item }) => <Item data={item} />} />
  fix: |
    Replace ScrollView + .map() with FlatList for dynamic lists.

- id: rn-no-inline-object-in-list-item
  why: |
    Inline style or data objects inside renderItem create new references every render, breaking row memoization.
  bad: |
    renderItem={({ item }) => <Row style={{ margin: 8 }} />}
  good: |
    const styles = StyleSheet.create({ row: { margin: 8 } }); renderItem={({ item }) => <Row style={styles.row} />}
  fix: |
    Use StyleSheet.create or hoist inline objects out of renderItem.

- id: rn-no-scroll-state
  why: |
    Tracking scroll position with onScroll state causes excessive re-renders. Use useSharedValue from Reanimated instead.
  bad: |
    const [scrollY, setScrollY] = useState(0); <ScrollView onScroll={e => setScrollY(e.nativeEvent.contentOffset.y)} />
  good: |
    const scrollY = useSharedValue(0); ... onScroll={e => { scrollY.value = e.nativeEvent.contentOffset.y }} />
  fix: |
    Use Reanimated shared values for scroll position.

- id: architecture.layered-boundary
  why: |
    A lower layer imports from a higher layer (e.g., infrastructure importing controller), violating the layered architecture boundary.
  bad: |
    // infrastructure/file.ts imports from controllers/file.ts
  good: |
    // infrastructure/file.ts imports from domain/file.ts (dependency inversion)
  fix: |
    Invert the dependency: higher layers depend on lower layers.

- id: next.local-server-boundary
  why: |
    A server component imports a client module or vice versa without proper boundary handling, breaking the Next.js server/client split.
  bad: |
    // server-component.tsx imports client-code.ts (ambiguous boundary)
  good: |
    // server-component.tsx imports server-utils.ts; "use client" component imports client-code.ts
  fix: |
    Ensure server-only imports are separated from client-only imports.

- id: svelte.global-dom-query
  why: |
    Using document.querySelector or similar DOM queries in Svelte bypasses the reactive system and may cause stale UI.
  bad: |
    document.querySelector(".modal").style.display = "block"
  good: |
    {#if showModal}<div class="modal">...</div>{/if}
  fix: |
    Use Svelte reactive declarations and conditional rendering.

- id: svelte.each-index-as-key
  why: |
    Using array index as {#each} key causes incorrect re-rendering when the array changes.
  bad: |
    {#each items as item, i (i)}
  good: |
    {#each items as item (item.id)}
  fix: |
    Use a stable identifier (e.g., item.id) instead of index.

- id: svelte.component-splitting
  why: |
    A Svelte component with too many reactive statements and conditional blocks should be split into smaller components.
  bad: |
    <script> let count = 0; $: doubled = count * 2; $: tripled = count * 3; </script>
  good: |
    Extract sections into separate components with focused responsibilities.
  fix: |
    Split the component into smaller single-purpose Svelte components.

