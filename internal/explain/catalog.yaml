# Scout Rule Catalog
# Each entry maps a rule_id to its explanation for `scout explain <rule_id>`.
# rule_id must match the finding's rule_id exactly (e.g. "general.jwt-verify-without-algorithms").
# Fields: why, bad, good, fix — all plain text or fenced code blocks.

- id: bun.bun-prefer-bun-file
