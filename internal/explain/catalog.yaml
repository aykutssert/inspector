- id: css.no-large-animated-blur
  why: |
    Large blur radius used in an animation. Animating blur() values above ~30px forces the GPU to re-composite on every frame, causing significant jank especially on mobile. Prefer smaller blur values (under 20px), or animate opacity/transform instead.
  bad: |
    # See `scout explain css.no-large-animated-blur` for code example
  good: |
    # See `scout explain css.no-large-animated-blur` for code example
  fix: |
    Large blur radius used in an animation.

- id: css.no-layout-property-animation
  why: |
    Animation or transition targets a layout-triggering property. Animating layout properties (such as width, height, top, left, margin, padding, or 'all') causes the browser to re-layout the page on every frame, which is computationally expensive and causes jank. Use transform (e.g., scale, translate) and opacity instead.
  bad: |
    # See `scout explain css.no-layout-property-animation` for code example
  good: |
    # See `scout explain css.no-layout-property-animation` for code example
  fix: |
    Animation or transition targets a layout-triggering property.

- id: css.no-outline-none
  why: |
    Disabling focus outlines with outline: none or outline: 0. Focus outlines are critical for keyboard navigation accessibility (A11y). If you disable the default outline, you must provide an alternative visible focus indicator (e.g., custom border or box-shadow ring) for focus states.
  bad: |
    # See `scout explain css.no-outline-none` for code example
  good: |
    # See `scout explain css.no-outline-none` for code example
  fix: |
    Disabling focus outlines with outline: none or outline: 0.

- id: css.no-permanent-will-change
  why: |
    will-change applied permanently in a static style prop. will-change signals to the browser to promote the element to its own GPU layer, consuming significant GPU memory. Apply it only just before an animation starts and remove it immediately after — permanent will-change is a net performance negative.
  bad: |
    # See `scout explain css.no-permanent-will-change` for code example
  good: |
    # See `scout explain css.no-permanent-will-change` for code example
  fix: |
    will-change applied permanently in a static style prop.

- id: express.express-async-error-handling
  why: |
    An asynchronous Express route handler does not wrap its execution in a try/catch block or use an async error handler wrapper. Unhandled async rejections in Express can crash the Node.js process or cause requests to hang. Wrap the body in try/catch and pass the error to next(err).
  bad: |
    app.get("/data", async (req, res) => { throw err })
  good: |
    app.get("/data", asyncHandler(async (req, res) => { ... }))
  fix: |
    Wrap async route handlers to catch rejected promises.

- id: express.express-body-limit-missing
  why: |
    Express body parsing middleware is configured without an explicit payload limit. Large JSON or form bodies can consume memory and CPU before route handlers run, creating a simple denial-of-service path. Set a small application-specific limit such as express.json({ limit: "1mb" }).
  bad: |
    app.use(express.json())  // no size limit
  good: |
    app.use(express.json({ limit: "10kb" }))
  fix: |
    Set a body size limit on JSON/URL-encoded body parsers.

- id: express.express-cors-wildcard-with-credentials
  why: |
    CORS is configured with origin '*' and credentials enabled. Browsers reject this combination, and relaxing it later often turns into credential leakage. Use an explicit allowlist of trusted origins when cookies or authorization headers are allowed.
  bad: |
    cors({ origin: "*", credentials: true })
  good: |
    cors({ origin: "https://trusted.com", credentials: true })
  fix: |
    Specify allowed origins explicitly instead of using wildcard with credentials.

- id: express.express-insecure-session-cookie
  why: |
    express-session config weakens the session cookie security flags. Session cookies should normally be httpOnly so JavaScript cannot read them, and secure in production so they are not sent over plain HTTP. Keep httpOnly enabled and set secure true behind HTTPS.
  bad: |
    session({ secret: "test", cookie: { secure: false } })
  good: |
    session({ secret: "test", cookie: { secure: true, httpOnly: true } })
  fix: |
    Enable secure and httpOnly flags on session cookies.

- id: express.express-missing-helmet
  why: |
    The Express application is initialized but does not appear to use the 'helmet' middleware. Helmet sets critical security headers to protect the app from common web vulnerabilities (XSS, Clickjacking, MIME-sniffing, etc.). Add app.use(helmet()) to secure HTTP headers.
  bad: |
    app = express()  // no helmet
  good: |
    app = express(); app.use(helmet())
  fix: |
    Add app.use(helmet()) after creating the express app.

- id: express.express-missing-rate-limit
  why: |
    This Express route handler does not appear to be protected by a rate-limiter. Without rate limiting, endpoints are vulnerable to brute-force and denial-of-service (DDoS) attacks. Apply express-rate-limit (or a similar middleware) to this router or globally via app.use(rateLimit({ ... })).
  bad: |
    app.post("/login", handler)  // no rate limit
  good: |
    app.post("/login", rateLimit({ windowMs: 15*60*1000, max: 100 }), handler)
  fix: |
    Add rate limiting middleware to sensitive routes.

- id: express.express-sensitive-route-no-auth
  why: |
    A sensitive Express route (e.g., containing 'admin', 'delete', 'update', 'secure', 'private', or 'remove') does not seem to use any authorization or authentication middleware. Ensure that route handlers for sensitive paths are protected using an authentication or permission-checking middleware.
  bad: |
    app.get("/admin", handler)  // no auth
  good: |
    app.get("/admin", authenticate, handler)
  fix: |
    Add authentication middleware to sensitive routes.

- id: express.express-trust-proxy-misconfig
  why: |
    Express trust proxy setting is missing, disabled, or not set to the correct proxy count. Without proper trust proxy configuration behind a reverse proxy (NGINX, Cloudflare, ELB), req.ip is spoofable via X-Forwarded-For and secure cookies may malfunction.
  bad: |
    app.set("trust proxy", false)
  good: |
    app.set("trust proxy", 1)
  fix: |
    Set trust proxy to the correct proxy count.

- id: general.await-in-loop
  why: |
    An await sits directly inside a loop, so the iterations run strictly one after another: each waits for the previous to finish. When the operations are independent (e.g. fetching N urls), this is needlessly slow and should be parallelized with Promise.all(items.map(...)). If each iteration genuinely depends on the previous, or you are intentionally rate-limiting, the serial form is correct.
  bad: |
    # See `scout explain general.await-in-loop` for code example
  good: |
    # See `scout explain general.await-in-loop` for code example
  fix: |
    An await sits directly inside a loop, so the iterations run strictly one after another: each waits for the previous to finish.

- id: general.bcrypt-weak-cost
  why: |
    bcrypt is configured with a cost factor below 10. Low bcrypt rounds make offline password cracking materially cheaper if password hashes leak. Use a cost of at least 10, then tune upward based on your production latency budget.
  bad: |
    # See `scout explain general.bcrypt-weak-cost` for code example
  good: |
    # See `scout explain general.bcrypt-weak-cost` for code example
  fix: |
    bcrypt is configured with a cost factor below 10.

